# fly.io config for the DensityGen public web demo.
# Deploy:  flyctl launch --copy-config --now   (first time, picks a unique name)
#     or:  flyctl deploy
app = "densitygen-ald"
primary_region = "sjc"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # Scale to zero when idle, wake on request -- cheap for a demo.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
