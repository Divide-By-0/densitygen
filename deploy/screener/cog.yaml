# Cog spec for the DensityGen screener API itself (CPU). This exposes the whole
# ranked-scorecard pipeline as a hosted Replicate endpoint that agents/UIs can
# call. It runs the fast descriptor scorer by default and, when use_ml_potential
# is set, calls the separately-deployed UMA GPU model for real energies.
#
# Push with:  cd deploy/screener && cog push r8.im/<your-username>/densitygen
build:
  gpu: false
  python_version: "3.12"
  python_packages:
    - "pydantic>=2.0"
    - "numpy>=1.24"
    - "replicate>=1.0"
  # REASON: the densitygen package lives at ../../src; Cog copies the build
  # context, so we vendor it in via run command at build (see README deploy note).
predict: "predict.py:Predictor"
